name: Approval

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  pull-requests: read

jobs:
  core-maintainer-approval:
    name: policy / require-core-maintainer-approval
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.base.ref == 'main' }}
    steps:
      - name: Require approval by a repo maintainer
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number, per_page: 100 },
            );

            const relevantStates = new Set(["APPROVED", "CHANGES_REQUESTED", "DISMISSED"]);
            const maintainerStates = new Map();
            const permissionCache = new Map();

            for (const review of reviews) {
              if (!relevantStates.has(review.state)) continue;

              const login = review.user?.login;
              if (!login) continue;

              if (!permissionCache.has(login)) {
                const permission = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: login,
                });
                permissionCache.set(login, permission.data.permission);
              }

              const permission = permissionCache.get(login);
              if (!["admin", "maintain", "write"].includes(permission)) continue;
              maintainerStates.set(login, review.state);
            }

            const blocking = [...maintainerStates.entries()]
              .filter(([, state]) => state === "CHANGES_REQUESTED")
              .map(([login]) => login);
            if (blocking.length > 0) {
              core.setFailed(
                `blocking review from repo maintainer(s): ${blocking.join(", ")}`,
              );
              return;
            }

            const approvers = [...maintainerStates.entries()]
              .filter(([, state]) => state === "APPROVED")
              .map(([login]) => login);
            if (approvers.length === 0) {
              core.setFailed("missing required approval by a repo maintainer");
              return;
            }

            core.notice(`ok: approved by repo maintainer(s): ${approvers.join(", ")}`);
